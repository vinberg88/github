name: Policy Labels Auto Sync

on:
  push:
    branches: [main]
    paths:
      - '.github/policy-matrix.json'
      - '.github/labels.yml'
  schedule:
    - cron: '35 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autosync-labels:
    name: Auto-sync labels from policy matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate synced labels file
        id: sync
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');

            const matrix = JSON.parse(fs.readFileSync('.github/policy-matrix.json', 'utf8'));
            const labelsPath = '.github/labels.yml';
            const labelsRaw = fs.readFileSync(labelsPath, 'utf8');

            if (!Array.isArray(matrix.managedLabels) || matrix.managedLabels.length === 0) {
              core.setFailed("policy-matrix.json must define a non-empty 'managedLabels' array.");
              return;
            }

            const chunks = labelsRaw.trim().split(/\n(?=-\s*name:\s*)/g).filter(Boolean);

            const parseName = (chunk) => {
              const m = chunk.match(/^-\s*name:\s*"?(.+?)"?\s*$/m);
              return m ? m[1] : null;
            };

            const toYamlBlock = (label) => {
              const name = String(label.name).replace(/"/g, '\\"');
              const color = String(label.color).replace(/"/g, '\\"').toUpperCase();
              const description = String(label.description).replace(/"/g, '\\"');
              return `- name: \"${name}\"\n  color: \"${color}\"\n  description: \"${description}\"`;
            };

            const managedByName = new Map();
            for (const label of matrix.managedLabels) {
              managedByName.set(label.name, label);
            }

            const nextChunks = [];
            const seen = new Set();
            let touched = 0;

            for (const chunk of chunks) {
              const name = parseName(chunk);
              if (!name || !managedByName.has(name)) {
                nextChunks.push(chunk.trimEnd());
                continue;
              }

              const expected = toYamlBlock(managedByName.get(name));
              if (chunk.trim() !== expected.trim()) {
                touched++;
              }
              nextChunks.push(expected);
              seen.add(name);
            }

            for (const [name, label] of managedByName.entries()) {
              if (!seen.has(name)) {
                nextChunks.push(toYamlBlock(label));
                touched++;
              }
            }

            if (touched === 0) {
              core.notice('No label drift detected.');
              core.setOutput('changed', 'false');
              return;
            }

            fs.writeFileSync(labelsPath, `${nextChunks.join('\n\n').trimEnd()}\n`, 'utf8');
            core.notice(`Synchronized managed labels (${touched} change(s)).`);
            core.setOutput('changed', 'true');

      - name: Create pull request for synced labels
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/policy-labels-autosync
          delete-branch: true
          commit-message: 'chore(policy): auto-sync labels from policy matrix'
          title: 'chore(policy): auto-sync labels from policy matrix'
          body: |
            Automated sync of `.github/labels.yml` from `.github/policy-matrix.json` (`managedLabels`).

            This PR was generated by `policy-labels-autosync.yml` to prevent label governance drift.
          labels: |
            workflows
            policy:needs-attention
