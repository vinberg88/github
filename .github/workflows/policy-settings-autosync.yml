name: Policy Settings Auto Sync

on:
  push:
    branches: [main]
    paths:
      - '.github/policy-matrix.json'
      - '.github/settings.yml'
  schedule:
    - cron: '20 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autosync:
    name: Auto-sync settings from policy matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate synced settings
        id: sync
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');

            const matrixPath = '.github/policy-matrix.json';
            const settingsPath = '.github/settings.yml';

            const matrix = JSON.parse(fs.readFileSync(matrixPath, 'utf8'));
            const settingsRaw = fs.readFileSync(settingsPath, 'utf8');

            if (!Array.isArray(matrix.requiredStatusChecks) || matrix.requiredStatusChecks.length === 0) {
              core.setFailed("policy-matrix.json must define a non-empty 'requiredStatusChecks' array.");
              return;
            }

            const uniqueChecks = [...new Set(matrix.requiredStatusChecks.map((s) => String(s).trim()).filter(Boolean))];
            if (uniqueChecks.length === 0) {
              core.setFailed("'requiredStatusChecks' cannot be empty after normalization.");
              return;
            }

            const blockRegex = /(required_status_checks:\s*\n\s*strict:\s*(?:true|false)\s*\n\s*contexts:\s*\n)([\s\S]*?)(\n\s*enforce_admins:)/m;
            const match = settingsRaw.match(blockRegex);

            if (!match) {
              core.setFailed("Could not locate required_status_checks.contexts block in .github/settings.yml");
              return;
            }

            const listIndentMatch = match[2].match(/^(\s*)-\s*"/m);
            const listIndent = listIndentMatch ? listIndentMatch[1] : '          ';
            const desiredLines = uniqueChecks.map((check) => `${listIndent}- \"${check.replace(/\"/g, '\\\"')}\"`).join('\n');

            const nextSettings = settingsRaw.replace(blockRegex, `$1${desiredLines}$3`);

            if (nextSettings === settingsRaw) {
              core.notice('No settings drift detected.');
              core.setOutput('changed', 'false');
              return;
            }

            fs.writeFileSync(settingsPath, nextSettings, 'utf8');
            core.notice('Updated settings.yml to match policy matrix required checks.');
            core.setOutput('changed', 'true');

      - name: Create pull request for synced settings
        if: steps.sync.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/policy-settings-autosync
          delete-branch: true
          commit-message: 'chore(policy): auto-sync settings required checks'
          title: 'chore(policy): auto-sync settings required checks'
          body: |
            Automated sync of `.github/settings.yml` required status checks from `.github/policy-matrix.json`.

            This PR was generated by `policy-settings-autosync.yml` to prevent governance drift.
          labels: |
            workflows
            policy:needs-attention
