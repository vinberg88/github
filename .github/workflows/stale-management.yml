name: Stale Issues and PRs

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale and close inactive items
    runs-on: ubuntu-latest
    steps:
      - name: Process stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: "Den här issue:n har varit inaktiv i 30 dagar och markeras som stale. Kommentera för att hålla den öppen."
          close-issue-message: "Stänger issue efter 7 dagar som stale utan aktivitet. Öppna gärna en ny issue vid behov."
          stale-pr-message: "Den här PR:en har varit inaktiv i 30 dagar och markeras som stale. Lägg en kommentar eller push för att ta bort stale-status."
          close-pr-message: "Stänger PR efter 7 dagar som stale utan aktivitet."
          days-before-issue-stale: 30
          days-before-issue-close: 7
          days-before-pr-stale: 30
          days-before-pr-close: 7
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "security,pinned"
          exempt-pr-labels: "security,pinned"
          exempt-draft-pr: true
