name: PR Title Policy

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enforce title pattern from policy matrix
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const title = context.payload.pull_request?.title || '';
            const matrix = JSON.parse(fs.readFileSync('.github/policy-matrix.json', 'utf8'));
            const titlePattern = new RegExp(matrix.prTitlePattern);

            if (!titlePattern.test(title)) {
              core.setFailed(
                `Invalid PR title '${title}'. It must match policy pattern '${matrix.prTitlePattern}'. Example: 'feat: add dashboard filter'.`
              );
              return;
            }

            core.notice('PR title matches policy matrix pattern.');
