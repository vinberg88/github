name: Policy Settings Alignment

on:
  pull_request:
    paths:
      - '.github/policy-matrix.json'
      - '.github/settings.yml'
      - '.github/workflows/*policy*.yml'
  push:
    branches: [main]
    paths:
      - '.github/policy-matrix.json'
      - '.github/settings.yml'
      - '.github/workflows/*policy*.yml'

permissions:
  contents: read

jobs:
  alignment:
    name: Validate policy and settings alignment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required checks are synchronized
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');

            const matrix = JSON.parse(fs.readFileSync('.github/policy-matrix.json', 'utf8'));
            const settingsRaw = fs.readFileSync('.github/settings.yml', 'utf8');

            if (!Array.isArray(matrix.requiredStatusChecks) || matrix.requiredStatusChecks.length === 0) {
              core.setFailed("policy-matrix.json must define a non-empty 'requiredStatusChecks' array.");
              return;
            }

            const contextRegex = /^\s*-\s*"([^"]+)"\s*$/gm;
            const settingsContexts = [...settingsRaw.matchAll(contextRegex)].map(m => m[1]);

            const missingInSettings = matrix.requiredStatusChecks.filter((check) => !settingsContexts.includes(check));
            const extraInSettings = settingsContexts.filter((check) => !matrix.requiredStatusChecks.includes(check));
            const duplicateInSettings = settingsContexts.filter((check, idx) => settingsContexts.indexOf(check) !== idx);

            if (missingInSettings.length > 0 || extraInSettings.length > 0 || duplicateInSettings.length > 0) {
              const parts = [];
              if (missingInSettings.length > 0) {
                parts.push(`missing: ${missingInSettings.join(', ')}`);
              }
              if (extraInSettings.length > 0) {
                parts.push(`extra: ${extraInSettings.join(', ')}`);
              }
              if (duplicateInSettings.length > 0) {
                parts.push(`duplicates: ${[...new Set(duplicateInSettings)].join(', ')}`);
              }

              core.setFailed(
                `settings.yml required checks are not aligned with policy matrix (${parts.join(' | ')})`
              );
              return;
            }

            core.notice('Policy matrix required status checks are aligned with settings.yml.');
