name: Branch Name Policy

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-branch-name:
    name: Validate branch naming convention
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check branch name format
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('node:fs');
            const headRef = context.payload.pull_request?.head?.ref || '';
            const matrix = JSON.parse(fs.readFileSync('.github/policy-matrix.json', 'utf8'));

            const allowPrefixes = matrix.branchAllowedPrefixes;
            if (allowPrefixes.some(prefix => headRef.startsWith(prefix))) {
              core.notice(`Branch '${headRef}' is allowed by prefix exception.`);
              return;
            }

            const conventionalPattern = new RegExp(matrix.branchNamePattern);

            if (!conventionalPattern.test(headRef)) {
              core.setFailed(
                `Invalid branch name '${headRef}'. Use format '<type>/<short-description>', e.g. 'feat/add-auth-lab' or 'fix/token-rotation'.`
              );
              return;
            }

            core.notice(`Branch '${headRef}' matches naming policy.`);
