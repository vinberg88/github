name: Docker Image Scan

on:
  pull_request:
    branches: [ main ]
    paths:
      - "Dockerfile*"
      - "apps/**/Dockerfile*"
      - ".dockerignore"
  push:
    branches: [ main ]
    paths:
      - "Dockerfile*"
      - "apps/**/Dockerfile*"
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-web:
    name: Trivy scan – web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build web image
        run: docker build -t trivy-scan-web:latest -f Dockerfile.web .

      - name: Run Trivy on web image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: trivy-scan-web:latest
          format: sarif
          output: trivy-web.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy web results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-web.sarif
          category: trivy-web

  trivy-api:
    name: Trivy scan – api
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build API image
        run: docker build -t trivy-scan-api:latest -f apps/api/Dockerfile apps/api

      - name: Run Trivy on API image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: trivy-scan-api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy API results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-api.sarif
          category: trivy-api
