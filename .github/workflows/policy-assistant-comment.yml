name: Policy Assistant Comment

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  policy-assistant:
    name: Comment actionable policy guidance
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build policy feedback and upsert PR comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const title = context.payload.pull_request.title || '';
            const body = context.payload.pull_request.body || '';
            const headRef = context.payload.pull_request.head.ref || '';
            const labels = (context.payload.pull_request.labels || []).map(l => l.name);

            const matrix = JSON.parse(fs.readFileSync('.github/policy-matrix.json', 'utf8'));

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100
            });

            const changed = files.map(f => f.filename);
            const userFacing = changed.some((path) =>
              matrix.userFacingPathPrefixes.some((prefix) => path.startsWith(prefix)) ||
              matrix.userFacingExactPaths.includes(path)
            );

            const issues = [];

            const titlePattern = new RegExp(matrix.prTitlePattern);
            if (!titlePattern.test(title)) {
              issues.push("**PR title**: använd Conventional format, t.ex. `feat: add dashboard filters`.");
            }

            const branchPattern = new RegExp(matrix.branchNamePattern);
            const allowPrefixes = matrix.branchAllowedPrefixes;
            if (!allowPrefixes.some(prefix => headRef.startsWith(prefix)) && !branchPattern.test(headRef)) {
              issues.push("**Branch name**: använd format `<type>/<description>`, t.ex. `fix/token-rotation`.");
            }

            const requiredSections = matrix.requiredPrSections;
            const missingSections = requiredSections.filter(section => !body.includes(section));
            if (missingSections.length > 0) {
              issues.push(`**PR body** saknar sektioner: ${missingSections.join(', ')}.`);
            }

            if (userFacing && !matrix.changelogLabels.some((label) => labels.includes(label))) {
              issues.push("**Changelog decision** saknas: lägg label `changelog:required` eller `changelog:skip`.");
            }

            if (labels.includes(matrix.sizeXlLabel) && !labels.includes(matrix.riskAcceptedLabel)) {
              issues.push("**Stor PR (`size/xl`)**: lägg label `risk:accepted` efter extra review eller dela upp PR:n.");
            }

            const marker = '<!-- policy-assistant -->';
            const commentBody = issues.length === 0
              ? `${marker}\n✅ **Policy Assistant**: inga åtgärder krävs just nu. Bra jobbat!`
              : `${marker}\n⚠️ **Policy Assistant – åtgärder behövs**\n\n${issues.map(i => `- ${i}`).join('\n')}\n\nNär detta är fixat uppdateras kommentaren automatiskt.`;

            const existing = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100
            });

            const botComment = existing.find(c =>
              c.user?.type === 'Bot' &&
              typeof c.body === 'string' &&
              c.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pull_number,
                body: commentBody
              });
            }
