version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 15
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      typescript-tooling:
        patterns:
          - "typescript"
          - "@types/*"
    commit-message:
      prefix: "deps"

  - package-ecosystem: "npm"
    directory: "/apps/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 15
    groups:
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      fastify:
        patterns:
          - "fastify"
          - "@fastify/*"
          - "fastify-plugin"
    commit-message:
      prefix: "deps-api"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
