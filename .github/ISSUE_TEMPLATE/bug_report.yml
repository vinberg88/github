name: Bug report
description: Report a reproducible defect
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Please fill in all relevant sections."

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Clear and concise description
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste logs, stack traces, or screenshots
      render: shell

  - type: input
    id: commit
    attributes:
      label: Commit / branch
      placeholder: e.g. main @ abc123

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - web
        - api
        - infra
        - workflows
        - docs
    validations:
      required: true
