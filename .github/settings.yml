repository:
  name: github
  private: false
  delete_branch_on_merge: true
  allow_merge_commit: false
  allow_squash_merge: true
  allow_rebase_merge: true
  has_issues: true
  has_projects: true
  has_wiki: false

branches:
  - name: main
    protection:
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
      required_status_checks:
        strict: true
        contexts:
          - "CI / validate"
          - "Policy Matrix Validate / Validate policy matrix structure"
          - "Policy Settings Alignment / Validate policy and settings alignment"
          - "Policy Labels Alignment / Validate policy labels alignment"
          - "Release Readiness Gate / Validate release readiness policy"
          - "PR Title Policy / Validate PR title"
          - "PR Body Policy / Validate PR body template compliance"
          - "Branch Name Policy / Validate branch naming convention"
          - "Changelog Policy / Enforce changelog labeling policy"
      enforce_admins: false
      restrictions: null
